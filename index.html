<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Event Wall</title>
<link rel="stylesheet" href="css/style.css?v=4.0">
</head>
<body>

  <div id="welcomeOverlay" class="welcome-overlay" hidden>
    <div class="welcome-card">
      <img id="welcomeImage" class="welcome-image" alt="Group photo">
      <h2 id="welcomeTitle">Welcome!</h2>
      <!-- The paragraph was removed from here -->
      <button id="welcomeCloseBtn" class="btn-primary" type="button">Continue</button>
    </div>
  </div>

  <header class="site-header">
    <a href="admin.html" class="admin-login-btn">Admin</a>
    <h1 id="eventName">Our Event Wall</h1>
    <p id="eventSubtitle">Share a photo, a memory, or a message for everyone to see.</p>
  </header>

  <!-- NEW: Inline message that scrolls away naturally -->
  <div class="welcome-message-wrap">
    <p id="inlineWelcomeNote"></p>
  </div>

  <div class="compose-wrap">
    <button id="openFormBtn" class="btn-open-form" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px; vertical-align: middle;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      New Post
    </button>

    <div id="postFormPanel" class="form-panel" hidden>
      <h2>New Post</h2>
      <form id="postForm">
        <div class="form-row">
          <input type="text" id="nameInput" placeholder="Name" maxlength="60">
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="anonCheckbox">
          <div class="toggle-switch"></div>
          <span>Post anonymously</span>
        </label>
        <textarea id="bodyInput" placeholder="What's on your mind?" maxlength="2000" required></textarea>

        <label class="file-label">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          Choose Photo
          <input type="file" id="imageInput" accept="image/*">
        </label>
        <img id="imagePreview" class="image-preview" hidden alt="Selected photo preview">

        <p id="formError" class="form-error" hidden></p>

        <div class="form-actions">
          <button type="button" id="cancelFormBtn" class="btn-secondary">Cancel</button>
          <button type="submit" id="submitBtn" class="btn-primary">Post</button>
        </div>
      </form>
    </div>
  </div>

  <div class="sort-wrap">
    <div class="sort-toggle" role="tablist" aria-label="Sort posts">
      <button type="button" class="sort-btn is-active" data-sort="newest" role="tab" aria-selected="true">Newest</button>
      <button type="button" class="sort-btn" data-sort="liked" role="tab" aria-selected="false">Popular</button>
    </div>
  </div>

  <div class="banner-wrap">
    <button id="newPostsBanner" class="new-posts-banner" hidden type="button">↑ New posts available</button>
  </div>

  <main class="feed" id="feed"></main>

  <p id="emptyState" class="empty-state" hidden>Nothing here yet — be the first to post!</p>

  <div class="load-more-wrap">
    <button id="loadMoreBtn" class="btn-load-more" hidden type="button">Load More</button>
  </div>

  <footer class="site-footer">
    <p>Powered by Event Wall</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js?v=4.0"></script>
</body>
</html>
