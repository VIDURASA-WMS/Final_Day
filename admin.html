<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Event Wall — Admin</title>
<link rel="stylesheet" href="css/style.css?v=2.0">
</head>
<body class="admin-body">

  <header class="admin-header">
    <h1 id="adminEventName">Event Wall Admin</h1>
    <button id="logoutBtn" class="btn-small-outline" hidden type="button">Log out</button>
  </header>

  <div id="loginPanel" class="login-wrap">
    <div class="login-card">
      <svg class="admin-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--ios-blue)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      <h2>Admin Access</h2>
      <form id="loginForm">
        <input type="password" id="passwordInput" placeholder="Password" required autofocus>
        <p id="loginError" class="login-error" hidden></p>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Log In</button>
      </form>
    </div>
  </div>

  <div id="dashboardPanel" class="dashboard" hidden>
    <div class="dashboard-toolbar">
      <span id="stats" class="stats-badge"></span>
      <button id="refreshBtn" class="btn-small-outline" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-top; margin-right: 4px;"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        Refresh
      </button>
    </div>
    <div id="postList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
